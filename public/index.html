<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Convo • Chat</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="app.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Convo</h1>
    <div id="authBox">
      <button id="btnAnon" class="btn">Σύνδεση (Anonymous)</button>
      <button id="btnSignOut" class="btn btn-ghost" style="display:none">Αποσύνδεση</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2>Δωμάτια</h2>
      <ul id="rooms"></ul>
    </aside>

    <section class="chat">
      <div id="status" class="status">Δεν έχεις συνδεθεί.</div>
      <div id="messages" class="messages"></div>
      <form id="msgForm" class="msgForm" style="display:none">
        <input id="msgInput" placeholder="Γράψε μήνυμα…" autocomplete="off" />
        <button class="btn">Send</button>
      </form>
    </section>

    <aside class="users">
      <h2>Χρήστες</h2>
      <ul id="usersList"></ul>
    </aside>
  </main>
</body>
</html>
